<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Docs Viewer</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#/">Docs</a>
      <label class="search">
        <span>Search</span>
        <input id="search-input" type="search" placeholder="packages, entities, docs">
      </label>
    </header>

    <div id="error" class="error" hidden></div>

    <main class="shell">
      <aside class="sidebar">
        <h2>Packages</h2>
        <nav id="package-list" class="nav-list" aria-label="Packages"></nav>
      </aside>

      <section class="content">
        <div id="search-results" class="search-results" hidden></div>
        <div id="view"></div>
      </section>
    </main>

    <script src="viewer.js" defer></script>
  </body>
</html>
