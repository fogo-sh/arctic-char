{
    "version": 9,
    "name": "Arctic Char",
    "fileformats": [
        { "format": "Valve" }
    ],
    "filesystem": {
        "searchpath": ".",
        "packageformat": { "extension": ".pak", "format": "idpak" }
    },
    "materials": {
        "root": "textures",
        "format": { "extensions": [".png", ".jpg", ".jpeg", ".tga"], "format": "image" }
    },
    "entities": {
        "definitions": [ "ArcticChar.fgd" ],
        "defaultcolor": "0.6 0.6 0.6 1.0"
    },
    "tags": {
        "brush": [
            {
                "name": "Trigger",
                "attribs": [ "transparent" ],
                "match": "classname",
                "pattern": "trigger*",
                "material": "trigger"
            }
        ],
        "brushface": []
    },
    "faceattribs": {
        "surfaceflags": [],
        "contentflags": []
    },
    "softMapBounds": "-4096 -4096 -4096 4096 4096 4096"
}
